name: Sync Releases from Upstream

on:
  schedule:
    - cron: '7 6 * * *'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Specific upstream tag to sync (leave empty to sync latest)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: git remote add upstream https://github.com/ggml-org/llama.cpp.git

      - name: Determine tag to sync
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(curl -s https://api.github.com/repos/ggml-org/llama.cpp/releases/latest | jq -r '.tag_name')
          fi
          echo "Syncing tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Check if a release with assets already exists (not just the tag)
          ASSET_COUNT=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            | jq '.assets | length // 0')

          if [ "$ASSET_COUNT" -gt "0" ]; then
            echo "Release $TAG already exists with $ASSET_COUNT assets, skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release $TAG does not exist or has no assets, will sync."
            echo "exists=false" >> "$GITHUB_OUTPUT"
            # Clean up any partial release
            gh release delete "$TAG" --yes 2>/dev/null || true
          fi

      - name: Sync tag from upstream
        if: steps.tag.outputs.exists == 'false'
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          git fetch upstream "refs/tags/$TAG:refs/tags/$TAG"
          git push origin "refs/tags/$TAG"

      - name: Download upstream release assets
        if: steps.tag.outputs.exists == 'false'
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p /tmp/assets
          RELEASE=$(curl -s "https://api.github.com/repos/ggml-org/llama.cpp/releases/tags/$TAG")
          echo "$RELEASE" | jq -r '.body // "Synced from upstream"' > /tmp/release-body.md

          echo "$RELEASE" | jq -r '.assets[] | "\(.browser_download_url) \(.name)"' | while read url name; do
            echo "Downloading $name ..."
            curl -L --retry 3 -o "/tmp/assets/$name" "$url"
          done

          echo "Downloaded $(ls /tmp/assets | wc -l) assets"

      - name: Create release in fork
        if: steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release create "$TAG" /tmp/assets/* \
            --title "$TAG" \
            --notes-file /tmp/release-body.md
